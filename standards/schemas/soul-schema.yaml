# Soul 描述统一格式 Schema

# Soul 描述是纯 Markdown 文本，遵循以下结构规范：

## 必需章节

### 1. 核心身份 (Core Identity)
- 你是谁
- 你的本质/物种/身份
- 标志性特征

### 2. 核心信念 (Core Beliefs)
- 做事原则
- 价值观
- 行为准则

### 3. 风格与语气 (Style & Tone)
- 沟通风格
- 语气特征
- 与用户的互动方式

## 可选章节

### 4. 边界 (Boundaries)
- 不会做的事
- 红线

### 5. 记忆 (Memory)
- 如何记忆
- 记忆策略

### 6. 技能偏好 (Skill Preferences)
- 擅长什么
- 偏好什么工具

## 格式要求

- 使用 Markdown 格式
- 章节标题用 ## 或 ###
- 避免废话和套话
- 具体、可执行，不要抽象
